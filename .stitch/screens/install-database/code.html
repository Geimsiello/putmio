<!DOCTYPE html>

<html class="dark" lang="it"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PutMio Installation Wizard - Step 3</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;700;800&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            background-color: #0b1326;
            font-family: 'Hanken Grotesk', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(23, 31, 51, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(70, 69, 84, 0.3);
        }
        .step-active {
            box-shadow: 0 0 15px rgba(192, 193, 255, 0.4);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#c0c1ff",
                        "on-primary": "#1000a9",
                        "primary-container": "#8083ff",
                        "on-primary-container": "#0d0096",
                        "surface": "#0b1326",
                        "surface-container": "#171f33",
                        "surface-container-high": "#222a3d",
                        "outline": "#908fa0",
                        "outline-variant": "#464554",
                        "on-surface": "#dae2fd",
                        "on-surface-variant": "#c7c4d7",
                        "background": "#0b1326",
                        "error": "#ef4444"
                    },
                    "fontFamily": {
                        "headline-lg": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],
                        "label-md": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center p-6 overflow-hidden relative">
<!-- Atmospheric Ambient Light -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<main class="w-full max-w-[560px] z-10">
<!-- Header & Logo -->
<div class="flex flex-col items-center mb-10 text-center">
<div class="flex items-center gap-3 mb-2">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">play_circle</span>
<span class="text-headline-md font-headline-md font-extrabold text-primary tracking-tight">PutMio</span>
</div>
<p class="text-label-md font-label-md text-on-surface-variant">Installazione PutMio — Step 3/6</p>
</div>
<!-- Installation Card -->
<div class="glass-panel rounded-3xl p-8 shadow-2xl overflow-hidden relative">
<!-- Progress Bar Cluster -->
<div class="flex gap-2 mb-10 h-1.5">
<div class="h-full flex-1 bg-primary rounded-full opacity-40"></div>
<div class="h-full flex-1 bg-primary rounded-full opacity-40"></div>
<div class="h-full flex-1 bg-primary rounded-full step-active"></div>
<div class="h-full flex-1 bg-outline-variant/30 rounded-full"></div>
<div class="h-full flex-1 bg-outline-variant/30 rounded-full"></div>
<div class="h-full flex-1 bg-outline-variant/30 rounded-full"></div>
</div>
<div class="mb-8">
<h2 class="text-headline-md font-headline-md text-on-surface mb-2">Database</h2>
<p class="text-body-md font-body-md text-on-surface-variant">Configura i parametri di connessione per il tuo archivio multimediale.</p>
</div>
<form class="space-y-5">
<div class="grid grid-cols-1 md:grid-cols-2 gap-5">
<!-- Host Field -->
<div class="space-y-2">
<label class="text-label-md font-label-md text-on-surface-variant px-1" for="db_host">Host MySQL</label>
<input class="w-full bg-surface-container-high border-outline-variant/40 rounded-xl px-4 py-3 text-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 outline-none" id="db_host" type="text" value="localhost"/>
</div>
<!-- Table Prefix Field -->
<div class="space-y-2">
<label class="text-label-md font-label-md text-on-surface-variant px-1" for="db_prefix">Prefisso tabelle</label>
<input class="w-full bg-surface-container-high border-outline-variant/40 rounded-xl px-4 py-3 text-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 outline-none" id="db_prefix" type="text" value="putmio_"/>
</div>
</div>
<!-- DB Name Field -->
<div class="space-y-2">
<label class="text-label-md font-label-md text-on-surface-variant px-1" for="db_name">Nome database</label>
<input class="w-full bg-surface-container-high border-outline-variant/40 rounded-xl px-4 py-3 text-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 outline-none" id="db_name" placeholder="es. putmio_media" type="text"/>
</div>
<!-- User Field -->
<div class="space-y-2">
<label class="text-label-md font-label-md text-on-surface-variant px-1" for="db_user">Utente</label>
<input class="w-full bg-surface-container-high border-outline-variant/40 rounded-xl px-4 py-3 text-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 outline-none" id="db_user" placeholder="Nome utente database" type="text"/>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="text-label-md font-label-md text-on-surface-variant px-1" for="db_pass">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-outline-variant/40 rounded-xl px-4 py-3 text-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 outline-none" id="db_pass" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Action Buttons -->
<div class="pt-6 flex flex-col sm:flex-row gap-4">
<button class="flex-1 px-6 py-3.5 border border-outline-variant/50 text-on-surface font-headline-md text-[16px] rounded-xl hover:bg-surface-container-high hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-[18px]">activity_zone</span>
                        Verifica connessione
                    </button>
<button class="flex-1 px-6 py-3.5 bg-primary-container text-on-primary-container font-headline-md text-[16px] rounded-xl hover:brightness-110 hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg flex items-center justify-center gap-2" type="submit">
                        Avanti
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</form>
</div>
<!-- Support Text -->
<p class="mt-8 text-center text-body-md font-body-md text-outline/60 px-4">
            Assicurati che il database esista già prima di procedere. <br class="hidden sm:block"/> In caso di dubbi, consulta il tuo hosting provider.
        </p>
</main>
<script>
        // Micro-interaction for form focus states
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Simple visibility toggle
        const toggleBtn = document.querySelector('button .material-symbols-outlined:contains("visibility")');
        if (toggleBtn) {
            toggleBtn.parentElement.addEventListener('click', () => {
                const passInput = document.getElementById('db_pass');
                const isPass = passInput.type === 'password';
                passInput.type = isPass ? 'text' : 'password';
                toggleBtn.textContent = isPass ? 'visibility_off' : 'visibility';
            });
        }
    </script>
</body></html>
