<style>
        body {
            background-color: #020617; /* slate-950 */
        }
        .glass-card {
            backdrop-filter: blur(8px);
            border: 1px solid rgba(144, 143, 160, 0.1);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="min-h-screen flex flex-col items-center justify-center p-6 transition-colors duration-500">
<!-- Theme Switcher -->
<div class="fixed top-8 right-8 z-50">
<button class="p-3 rounded-full bg-surface-container-high text-on-surface-variant hover:bg-surface-variant transition-all active:scale-95 shadow-lg" id="theme-toggle">
<span class="material-symbols-outlined" data-icon="light_mode">light_mode</span>
</button>
</div>
<!-- Login Container -->
<main class="w-full max-w-[400px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Brand Header -->
<div class="text-center mb-10">
<h1 class="text-headline-md font-headline-md font-extrabold text-primary tracking-tight mb-2">
                PutMio
            </h1>
<p class="text-label-md font-label-md text-on-surface-variant uppercase tracking-widest opacity-80">
                Il tuo media center personale
            </p>
</div>
<!-- Login Card -->
<div class="bg-surface-container glass-card rounded-xl shadow-2xl p-8 md:p-10">
<div class="mb-8">
<h2 class="text-headline-md font-headline-md text-on-surface mb-2">Accedi</h2>
<div class="h-1 w-12 bg-primary rounded-full"></div>
</div>
<!-- Error Message -->
<div class="mb-6 flex items-center gap-3 p-3 bg-error/10 border border-error/20 rounded-lg animate-pulse">
<span class="material-symbols-outlined text-error text-[20px]" data-icon="error">error</span>
<span class="text-label-md font-label-md text-error">Credenziali non valide</span>
</div>
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-label-md font-label-md text-on-surface-variant ml-1" for="email">Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-3 bg-surface-container-lowest border border-outline-variant/30 rounded-lg text-on-surface placeholder-outline focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all font-body-md" id="email" name="email" placeholder="nome@esempio.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="text-label-md font-label-md text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-11 pr-4 py-3 bg-surface-container-lowest border border-outline-variant/30 rounded-lg text-on-surface placeholder-outline focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all font-body-md" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Action Buttons -->
<div class="pt-2">
<button class="w-full py-4 px-6 bg-[#6366f1] hover:bg-[#4f46e5] text-white font-bold rounded-lg shadow-lg shadow-indigo-500/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Accedi</span>
<span class="material-symbols-outlined text-[18px]" data-icon="login">login</span>
</button>
</div>
<!-- Secondary Links -->
<div class="text-center">
<a class="text-label-md font-label-md text-[#6366f1] hover:text-[#818cf8] transition-colors border-b border-transparent hover:border-[#818cf8] inline-block" href="#">
                        Password dimenticata?
                    </a>
</div>
</form>
</div>
<!-- Footer Decoration -->
<div class="mt-12 text-center">
<div class="flex justify-center gap-6 text-on-surface-variant/40">
<span class="material-symbols-outlined cursor-default" data-icon="movie">movie</span>
<span class="material-symbols-outlined cursor-default" data-icon="tv">tv</span>
<span class="material-symbols-outlined cursor-default" data-icon="library_music">library_music</span>
</div>
</div>
</main>
<script>
        const themeToggle = document.getElementById('theme-toggle');
        const html = document.documentElement;
        const icon = themeToggle.querySelector('.material-symbols-outlined');

        themeToggle.addEventListener('click', () => {
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                document.body.style.backgroundColor = '#f8fafc'; // slate-50
                icon.innerText = 'dark_mode';
                icon.setAttribute('data-icon', 'dark_mode');
            } else {
                html.classList.add('dark');
                document.body.style.backgroundColor = '#020617'; // slate-950
                icon.innerText = 'light_mode';
                icon.setAttribute('data-icon', 'light_mode');
            }
        });

        // Simple subtle animation on input focus
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('translate-x-1');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('translate-x-1');
            });
        });
    </script>
</body></html>
