<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const button = document.querySelector('button');
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-95');
            });
            
            // Add a subtle subtle parallax to the background blobs based on mouse move
            document.addEventListener('mousemove', (e) => {
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                
                const blobs = document.querySelectorAll('.fixed > div');
                blobs[0].style.transform = `translate(${x * 30}px, ${y * 30}px)`;
                blobs[1].style.transform = `translate(${x * -30}px, ${y * -30}px)`;
            });
        });
    </script>
