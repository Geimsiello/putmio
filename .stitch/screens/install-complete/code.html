<!-- Micro-interaction for Success Party -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.body;
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-10px';
                confetti.style.backgroundColor = i % 2 === 0 ? '#c0c1ff' : '#10b981';
                confetti.style.opacity = Math.random();
                confetti.style.transform = `scale(${Math.random()})`;
                
                container.appendChild(confetti);
                
                const duration = 3000 + Math.random() * 2000;
                const startTime = Date.now();
                const xOffset = (Math.random() - 0.5) * 200;

                const animate = () => {
                    const elapsed = Date.now() - startTime;
                    const progress = elapsed / duration;
                    
                    if (progress < 1) {
                        confetti.style.top = progress * 110 + 'vh';
                        confetti.style.left = `calc(${confetti.style.left} + ${Math.sin(progress * 10) * 2}px)`;
                        requestAnimationFrame(animate);
                    } else {
                        confetti.remove();
                    }
                };
                requestAnimationFrame(animate);
            }
        });
    </script>
